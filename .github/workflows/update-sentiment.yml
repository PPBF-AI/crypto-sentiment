name: Update crypto sentiment

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}       # manual run button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow this workflow to push changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run sentiment generator
        run: python sentiment_generator.py

      - name: Commit updated sentiment.json
        run: |
          if git diff --quiet sentiment.json; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sentiment.json
            git commit -m "Update sentiment.json [skip ci]"
            git push
          fi
